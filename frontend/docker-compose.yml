# Docker Compose khusus frontend (Vite + Preact → nginx).
#
# Build memakai file .env yang sama dengan dev (Vite membacanya langsung saat
# `vite build`). Ubah .env lalu `docker compose up --build` untuk menerapkannya.
services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: jualanapp-frontend
    container_name: jualanapp-frontend
    ports:
      - "9000:80"
    restart: unless-stopped
    healthcheck:
      # Pakai 127.0.0.1 (IPv4), bukan localhost: nginx hanya listen IPv4,
      # sedangkan 'localhost' bisa resolve ke IPv6 ::1 → connection refused.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
